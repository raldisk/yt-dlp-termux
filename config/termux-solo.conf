# termux-solo.conf — yt-dlp configuration for Termux (solo/single URL mode)
# Managed by: yt-dlp-termux
#
# PERSONAL SETTINGS belong in user.conf — NOT in this file.
# Template: ~/.config/yt-dlp-termux/config/user.conf
#
# CHANGELOG
# 2026-03-12  Item 2.1: commented out personal cookie/archive/batchfile references
# 2026-03-12  Item 1.5: removed duplicate --fixup never
# 2026-03-12  Item 1.6: fixed chaannel_url typo → channel_url in factsheet block

# ─── POT Provider — bgutil HTTP server ───────────────────────────────────────
--extractor-args "youtubepot-bgutilhttp:base_url=http://127.0.0.1:4416"

# Fallback: direct script mode (uncomment if HTTP server is unavailable)
# --extractor-args "youtubepot-bgutilscript:script_path=/root/bgutil-ytdlp-pot-provider/server/build/generate_once.js"

# ─── YouTube extractor arguments ─────────────────────────────────────────────
--extractor-args "youtubetab:skip=authcheck;youtube:formats=dashy;youtube:skip=hls;youtube:player_client=android_sdkless,mweb,web_creator,tv_embedded,web_safari,web_embedded;youtube:player_js_version=actual;youtube:fetch_pot=always;youtube:playback_wait=3;youtube-ejs:jitless=true"

# ─── JavaScript runtimes ──────────────────────────────────────────────────────
--extractor-args "youtube:jsinterp_order=node,quickjs:/data/data/com.termux/files/usr/bin/qjs,deno:/data/data/com.termux/files/home/.deno/bin/deno"

# ─── Format selection ─────────────────────────────────────────────────────────
# H.264 (AVC) preferred — low CPU overhead on mobile hardware
-f "bv[vcodec^=avc]+ba[acodec^=mp4a]/bv[vcodec^=avc]+ba/bv+ba/best"
--merge-output-format mp4

# ─── Network ─────────────────────────────────────────────────────────────────
# -N 4: reduced from desktop default (64) for mobile stability
-N 4
--socket-timeout 30
--retries 10
--fragment-retries 10
--retry-sleep 5

# ─── Output template ─────────────────────────────────────────────────────────
# Layout: <root>/<channel> [id]/REL_<upload_date> DL_<download_date_PHT> <title.100B> [vcodec acodec][extractor id].ext
# REL_ fallback chain: upload_date → release_date → epoch
# DL_  timestamp: epoch + 28800s offset = UTC+8 (PHT)
--paths "/data/data/com.termux/files/home/storage/shared/Termux-Extension-Archive"
-o "%(channel)s [%(channel_id)s]/REL_%(upload_date>%Y%m%d,release_date>%Y%m%d,epoch>%Y%m%d)s DL_%(epoch+28800>%Y%m%d_%H%M%S)s %(title).100B [%(vcodec)s %(acodec)s][%(extractor_key)s %(id)s].%(ext)s"
-o "thumbnail:%(channel)s [%(channel_id)s]/%(id)s.%(ext)s"

# ─── Metadata ────────────────────────────────────────────────────────────────
--write-info-json
--embed-thumbnail
--embed-metadata
--embed-chapters
--embed-subs
--sub-langs "en.*,en-orig"
--convert-thumbnails jpg
--parse-metadata "%(title)s:%(meta_title)s"

# ─── Factsheet sidecar (item 1.6: channel_url — typo corrected from chaannel_url) ──
--print-to-file "%(channel)s\n%(channel_url)s\n%(uploader_id)s\n%(webpage_url)s\n%(title)s\n%(upload_date)s\n%(duration_string)s\n%(view_count)s\n%(like_count)s\n%(description)s" "%(channel)s [%(channel_id)s]/%(id)s.factsheet.nfo"

# ─── SponsorBlock ────────────────────────────────────────────────────────────
--sponsorblock-mark "sponsor,intro,outro,selfpromo,interaction,music_offtopic"

# ─── Progress ────────────────────────────────────────────────────────────────
--progress
--console-title
--newline

# ─── Error handling ──────────────────────────────────────────────────────────
# item 1.5: --fixup never appears once only (duplicate removed)
--fixup never
--ignore-errors
--no-abort-on-error

# ─── Cache ───────────────────────────────────────────────────────────────────
--cache-dir "/data/data/com.termux/files/home/.cache/yt-dlp"

# ─── PERSONAL CONFIG — use user.conf instead ─────────────────────────────────
# item 2.1: personal references commented out.
# A fresh clone of this repo must not have personal paths active.
# Place these in ~/.config/yt-dlp-termux/config/user.conf
#
# --cookies /path/to/your-cookies.txt
# --download-archive /path/to/your-archive.txt
# -a /path/to/your-batchfile.txt
