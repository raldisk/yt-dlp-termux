# Adapted from laptop_NEW-solo.conf for Termux (Android/aarch64)
#
# COMPLETE CHANGELOG vs laptop_NEW-solo.conf
# -------------------------------------------
#
# [POT PROVIDER]
#   - youtubepot-bgutilhttp (HTTP server mode) commented out — requires persistent
#     background server, impractical for mobile without automation script
#   - youtubepot-bgutilscript (Node.js script mode) set as ACTIVE — invokes Node
#     per download with no server process required
#   - bgutil script path updated to Termux absolute path:
#     /data/data/com.termux/files/home/storage/shared/Github/
#     bgutil-ytdlp-pot-provider/server/build/generate_once.js
#
# [JS RUNTIMES]
#   - All Windows absolute paths (C:\Users\Username\...) removed
#   - node: active via pkg install nodejs (in PATH)
#   - quickjs: active with explicit Termux binary path
#     (/data/data/com.termux/files/usr/bin/qjs)
#     NOTE: binary is 'qjs' not 'quickjs'
#   - deno: active via ~/.deno/bin/deno (installed via curl script)
#   - bun: DISABLED — "cannot execute: required file not found"
#     (ABI mismatch on this Android kernel)
#   - remote-components ejs:npm and ejs:github retained
#
# [PATH SEPARATORS]
#   - All Windows backslashes (\) in active -o, --print-to-file,
#     and output path arguments converted to forward slashes (/)
#     across all sections: Descriptions, Links, Infojson, Thumbnail,
#     Metadata, Heatmaps, Comments, Factsheets, Extension Archive
#
# [CONCURRENT FRAGMENTS]
#   - -N reduced from 64 (laptop) to 4 (mobile)
#   - Rationale: prevents OOM kills and thermal throttling on mobile CPU
#   - Can be raised to -N 8 cautiously if device handles it
#
# [FFMPEG]
#   - --ffmpeg-location removed entirely
#   - ffmpeg installed via pkg install ffmpeg and available in Termux PATH
#
# [OUTPUT ARCHIVE]
#   - Output root renamed from Laptop-Extension-Archive
#     to Termux-Extension-Archive to avoid collision with laptop downloads
#     if storage is ever shared
#
# [COOKIES]
#   - Windows absolute cookie paths converted to relative paths
#   - All cookie lines remain commented out; activate as needed
#
# [AUTOMATION — companion script]
#   - ytdlp-run.sh created as a wrapper for HTTP server mode (Alpine proot)
#   - Handles: proot bgutil server startup, port readiness check,
#     yt-dlp execution, server teardown, termux-wake-lock / termux-wake-unlock
#   - To use HTTP mode instead: comment out bgutilscript line above,
#     uncomment bgutilhttp line, and invoke via ytdlp-run.sh
#
# Execute with:
#   yt-dlp --config-location ~/storage/shared/Github/termux-solo.conf "URL"
# Or via automation wrapper:
#   ~/storage/shared/Github/ytdlp-run.sh "URL"
