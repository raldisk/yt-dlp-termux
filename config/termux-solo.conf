## NOTES
# plugin path (Termux): ~/.local/lib/python3.x/site-packages/yt_dlp_plugins/extractor/
# bgutil server: ~/storage/shared/Github/bgutil-ytdlp-pot-provider/server
# https://github.com/yt-dlp/yt-dlp/issues/14755#issuecomment-3452567441


# ============================================
# POT PROVIDER — TERMUX
# ============================================
# HTTP server mode — ACTIVE (via Alpine proot + Deno, managed by ytdlp-run.sh / pot.sh)
--extractor-args "youtubepot-bgutilhttp:base_url=http://127.0.0.1:4416"

# Script mode — fallback if HTTP server is unavailable (Node.js only, no server needed)
#--extractor-args 'youtubepot-bgutilscript:script_path=/data/data/com.termux/files/home/storage/shared/Github/bgutil-ytdlp-pot-provider/server/build/generate_once.js'

#--extractor-args "youtubepot-bgutilscript:script_path=/dev/null"

# ============================================
# JS RUNTIMES — Termux (actual install paths)
# node:    pkg install nodejs
# qjs:     pkg install quickjs  (binary is 'qjs', not 'quickjs')
# bun:     ~/.bun/bin/bun  (add to PATH via ~/.bashrc)
# deno:    ~/.deno/bin/deno  (may fail on some Android kernels — ABI mismatch)
# ============================================
--js-runtimes node
--js-runtimes 'quickjs:/data/data/com.termux/files/usr/bin/qjs'
#--js-runtimes 'bun:/data/data/com.termux/files/home/.bun/bin/bun'
# Bun disabled — "cannot execute: required file not found" (ABI mismatch, same as Deno)
--js-runtimes 'deno:/data/data/com.termux/files/home/.deno/bin/deno'
--remote-components ejs:npm
--remote-components ejs:github

#--extractor-args "youtubejsc-deno:_debug=true"

--extractor-args "youtubetab:skip=authcheck;youtube:formats=dashy;youtube:skip=hls;youtube:player_client=android_sdkless,mweb,web_creator,tv_embedded,web_safari,web_embedded;youtube:player_js_version=actual;youtube:fetch_pot=always;youtube:playback_wait=3;youtube-ejs:jitless=true"

# ============================================
# COOKIES (burner accounts)
# log in to youtube.com/robots.txt in incognito, export cookies
# place .txt files in your working directory or supply absolute paths
# ============================================
#--cookies incognito-cookies/incognito-reinerbraun.txt
#--cookies incognito-cookies/incognito-coveyylarajean.txt
#--cookies incognito-cookies/incognito-ryumazorro.txt
#--cookies incognito-cookies/incognito-jkirstein.txt
#--cookies incognito-cookies/incognito-yeagerzeke.txt
#--cookies incognito-cookies/incogni-sakainu.txt
#--cookies incognito-cookies/incognito-yeagereren649.txt
#--cookies incognito-cookies/incognito-hajimeisayama.txt
#--cookies incognito-cookies/incognito-brooksama.txt
#--cookies incognito-cookies/incognito-bennbeckmannn.txt
#--cookies incognito-cookies/incognito-ackermann.txt

# ============================================
# CONCURRENT FRAGMENTS
# NOTE: Reduced from -N 64 (laptop) to -N 4 for mobile CPU/RAM safety.
# Increase cautiously: -N 8 is a reasonable ceiling on most Android devices.
# ============================================
-N 4

# ============================================
# DOWNLOAD ARCHIVE (extended)
# ============================================
#--download-archive arkayb.txt
#--download-archive termux-arkayb.txt

-o "Termux-Extension-Archive/%(channel,uploader)s - %(title).95s [%(resolution)s-%(fps)s-FPS-%(dynamic_range)s] [%(release_timestamp>%A %Y-%m-%d %I:%M %p %Z,release_date>%A %Y-%m-%d %I:%M %p %Z,modified_date>%A %Y-%m-%d %I:%M %p %Z,modified_timestamp>%A %Y-%m-%d %I:%M %p %Z,upload_date>%A %Y-%m-%d %I:%M %p %Z,upload_timestamp>%A %Y-%m-%d %I:%M %p %Z,timestamp>%A %Y-%m-%d %I:%M %p %Z,release_year,epoch>DL %A %Y-%m-%d %I:%M %p %Z)s] [%(vcodec)s][%(acodec)s] [%(extractor)s.%(islive&live.|)s%(id)s] {%(format_id)s}"

--print-to-file "%(uploader)s - %(title).95s [%(resolution)s-%(fps)s-FPS-%(dynamic_range)s] [%(release_timestamp>%A %Y-%m-%d %I:%M %p %Z,release_date>%A %Y-%m-%d %I:%M %p %Z,modified_date>%A %Y-%m-%d %I:%M %p %Z,modified_timestamp>%A %Y-%m-%d %I:%M %p %Z,upload_date>%A %Y-%m-%d %I:%M %p %Z,upload_timestamp>%A %Y-%m-%d %I:%M %p %Z,timestamp>%A %Y-%m-%d %I:%M %p %Z,release_year,epoch>DL %A %Y-%m-%d %I:%M %p %Z)s] [%(vcodec)s][%(acodec)s] [%(extractor)s.%(islive&live.|)s%(id)s] {%(format_id)s}" "Termux-Extension-Archive/%(uploader)s-Ext-Archive/termux-extended-archive.txt"

# ============================================
# COMMENTS HANDLING
# ============================================
--extractor-args "youtube:max_comments=100,10,10,10;comment_sort=top"
--write-comments
--parse-meta "video::(?P<comments>)"
--print-to-file "after_filter:%(comments)#j" "%(channel,uploader)s/Misc/Comments/%(title).95s [REL_%(release_timestamp>%Y-%m-%d_%I-%M-%S_%p,modified_date>%Y-%m-%d_%I-%M-%S_%p,timestamp>%Y-%m-%d_%I-%M-%S_%p,epoch>%Y-%m-%d_%I-%M-%S_%p)s] [DL_%(epoch+28800>%Y-%m-%d - %I-%M-%S)s] [%(extractor)s.%(islive&live.|)s%(id)s].comments.json"

# SUBTITLES
# Due to recent YT changes, subtitle needs PoToken now
# https://github.com/yt-dlp/yt-dlp/issues/13075
#--write-subs --write-auto-subs --embed-subs --compat-options no-keep-subs

# ============================================
# ERROR HANDLING AND FIXES
# ============================================
--no-abort-on-error
--no-overwrites
--sponsorblock-mark all,-filler
--fixup never

# ============================================
# PROGRESS DISPLAY
# ============================================
--progress
--progress-template "download-title:%(progress._percent_str)s %(progress._eta_str)s %(progress._speed_str)s"
--progress-delta 0.2

--skip-unavailable-fragments
--console-title
--mtime
--no-check-certificates
--fixup never
--embed-thumbnail
--embed-chapters
--newline

# ============================================
# METADATA: BROKEN FLAG
# ============================================
--parse-metadata video:"format_note:(?P<premium>Premium)"

# ============================================
# FFMPEG SETTINGS
# ============================================
--no-write-playlist-metafiles
--use-postprocessor FFmpegCopyStream
--ppa "copystream:-id3v2_version 3 -metadata:s:v comment=Cover\ (Front)"
--merge-output-format mkv
--remux mkv
# ffmpeg is in PATH on Termux (pkg install ffmpeg) — no --ffmpeg-location needed

# ============================================
# EMBED AND METADATA CONVERSION
# ============================================
--embed-metadata
--convert-thumbnails png
--ppa "ThumbnailsConvertor:-vf scale=1920x1080"
--write-link
--write-description
--write-info-json
--write-thumbnail

# ============================================
# ADDITIONAL OUTPUTS (DESCRIPTION, LINKS, METADATA)
# ============================================
-o "description:%(channel,uploader)s/Misc/Descriptions/%(title).95s %(premium&{}|)s [%(resolution)s-%(fps)s-FPS-%(dynamic_range)s] [REL_%(release_timestamp>%Y-%m-%d_%I-%M-%S_%p,modified_date>%Y-%m-%d_%I-%M-%S_%p,timestamp>%Y-%m-%d_%I-%M-%S_%p,epoch>%Y-%m-%d_%I-%M-%S_%p)s] [DL_%(epoch+28800>%Y-%m-%d - %I-%M-%S)s] [%(vcodec)s][%(acodec)s] [%(extractor)s.%(islive&live.|)s%(id)s] {%(format_id)s}.%(ext)s"

-o "link:%(channel,uploader)s/Misc/Links/%(title).95s %(premium&{}|)s [%(resolution)s-%(fps)s-FPS-%(dynamic_range)s] [REL_%(release_timestamp>%Y-%m-%d_%I-%M-%S_%p,modified_date>%Y-%m-%d_%I-%M-%S_%p,timestamp>%Y-%m-%d_%I-%M-%S_%p,epoch>%Y-%m-%d_%I-%M-%S_%p)s] [DL_%(epoch+28800>%Y-%m-%d - %I-%M-%S)s] [%(vcodec)s][%(acodec)s] [%(extractor)s.%(islive&live.|)s%(id)s] {%(format_id)s}.%(ext)s"

# MAIN FILE OUTPUT
-o "%(channel,uploader)s/%(title).95s%(premium& {}|)s [%(resolution)s-%(fps)s-FPS-%(dynamic_range)s] [REL_%(release_timestamp>%Y-%m-%d_%I-%M-%S_%p,modified_date>%Y-%m-%d_%I-%M-%S_%p,timestamp>%Y-%m-%d_%I-%M-%S_%p,epoch>%Y-%m-%d_%I-%M-%S_%p)s] [DL_%(epoch+28800>%Y-%m-%d - %I-%M-%S)s] [%(vcodec)s][%(acodec)s] [%(extractor)s.%(islive&live.|)s%(id)s] {%(protocol)s} {%(format_id)s}.%(ext)s"

-o "infojson:%(channel,uploader)s/Misc/Infojson/%(title).95s %(premium&{}|)s [%(resolution)s-%(fps)s-FPS-%(dynamic_range)s] [REL_%(release_timestamp>%Y-%m-%d_%I-%M-%S_%p,modified_date>%Y-%m-%d_%I-%M-%S_%p,timestamp>%Y-%m-%d_%I-%M-%S_%p,epoch>%Y-%m-%d_%I-%M-%S_%p)s] [DL_%(epoch+28800>%Y-%m-%d - %I-%M-%S)s] [%(vcodec)s][%(acodec)s] [%(extractor)s.%(islive&live.|)s%(id)s] {%(format_id)s}.%(ext)s"

-o "thumbnail:%(channel,uploader)s/Misc/Thumbnail/%(title).95s %(premium&{}|)s [%(resolution)s-%(fps)s-FPS-%(dynamic_range)s] [REL_%(release_timestamp>%Y-%m-%d_%I-%M-%S_%p,modified_date>%Y-%m-%d_%I-%M-%S_%p,timestamp>%Y-%m-%d_%I-%M-%S_%p,epoch>%Y-%m-%d_%I-%M-%S_%p)s] [DL_%(epoch+28800>%Y-%m-%d - %I-%M-%S)s] [%(extractor)s.%(islive&live.|)s%(id)s].%(ext)s"

# ============================================
# METADATA PRINTING AND EXPORT
# ============================================
--print-to-file "%(.{title,id,view_count,like_count,description,thumbnail,channel,channel_follower_count,uploader,uploader_id,upload_date,license,location,duration,duration_string,view_count,like_count,dislike_count,comment_count,original_url,requested_formats,channel_id,chaannel_url,webpage_url,tags,})#j" "%(channel,uploader)s/Misc/Metadata/%(title).95s %(premium&{}|)s [%(resolution)s-%(fps)s-FPS-%(dynamic_range)s] [REL_%(release_timestamp>%Y-%m-%d_%I-%M-%S_%p,modified_date>%Y-%m-%d_%I-%M-%S_%p,timestamp>%Y-%m-%d_%I-%M-%S_%p,epoch>%Y-%m-%d_%I-%M-%S_%p)s] [DL_%(epoch+28800>%Y-%m-%d - %I-%M-%S)s] [%(vcodec)s][%(acodec)s] [%(extractor)s.%(islive&live.|)s%(id)s] {%(format_id)s}.pretty.json"

--print-to-file "%(heatmap)#j" "%(channel,uploader)s/Misc/Heatmaps/%(title).95s %(premium&{}|)s [%(resolution)s-%(fps)s-FPS-%(dynamic_range)s] [REL_%(release_timestamp>%Y-%m-%d_%I-%M-%S_%p,modified_date>%Y-%m-%d_%I-%M-%S_%p,timestamp>%Y-%m-%d_%I-%M-%S_%p,epoch>%Y-%m-%d_%I-%M-%S_%p)s] [DL_%(epoch+28800>%Y-%m-%d - %I-%M-%S)s] [%(vcodec)s][%(acodec)s] [%(extractor)s.%(islive&live.|)s%(id)s] {%(format_id)s}.heatmap.json"

--print-to-file "%(playlist&--------------- PLAYLIST -------------------------------|)s%(playlist&
  playlist_title:       |)s%(playlist_title|)s%(playlist&
  playlist:             |)s%(playlist|)s%(playlist&
  playlist_id:          |)s%(playlist_id|)s%(playlist&
  playlist uploader:    |)s%(playlist_uploader|)s%(playlist&
  playlist uploader id: |)s%(playlist_uploader_id|)s%(playlist&
  playlist index:       |)s%(playlist_index&{} / |)s%(playlist_count|)s%(playlist&
  playlist autonumber:  |)s%(playlist_autonumber&{} / |)s%(n_entries|)s%(playlist&
  ---------------------------------------------------------|)sfilename:               %(filename|)s
  ---------------- TITLE ----------------------------------
  title:                  %(title|)s
  fulltitle:              %(fulltitle|)s
  alt title:              %(alt_title|)s
  categories:             %(categories|)s
  tags:                   %(tags|)s
  ---------------- WWW ------------------------------------
  id:                     %(id|)s
  display id:             %(display_id|)s
  original url:           %(original_url|)s
  webpage url:            %(webpage_url|)s
  protocol:               %(protocol|)s
  extractor:              %(extractor|)s
  extractor key:          %(extractor_key|)s
  ---------------- TIME ----------------------------------
  location:               %(location|)s
  live status:            %(live_status|)s (islive:%(islive&yes|no)s, waslive:%(waslive&yes|no)s)
  released:               %(release_timestamp>%Y-%m-%d %H:%M,release_date>%Y-%m-%d,release_year|)s
  last modified:          %(modified_timestamp>%Y-%m-%d %H:%M,modified_date>%Y-%m-%d|)s
  uploaded:               %(upload_timestamp>%Y-%m-%d %H:%M,upload_date>%Y-%m-%d|)s
