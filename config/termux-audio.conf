# ============================================
# TERMUX CONFIG — AUDIO-ONLY VARIANT
# Platform: Android / Termux (aarch64)
# Base path: ~/storage/shared/
# Run with: yt-dlp --config-location termux-audio.conf
# Or via: ytdlp-run.sh (select option 2, then audio)
#
# Derived from termux-solo.conf.
# Key differences vs solo:
#   - Video stream stripped entirely — audio only
#   - Preferred codec: opus (native YouTube format, no transcode)
#   - Output container: .opus (or .m4a fallback)
#   - Output path scoped to Audio/ subfolder
#   - No resolution/fps/dynamic_range in filename (not applicable)
#   - No video-specific ffmpeg post-processing
#   - --no-playlist active (use termux-playlist.conf for channels)
# ============================================

--cookies 2026-marcophoenix.txt
--download-archive crabs-arkayb.txt

--format-sort-force
--prefer-insecure
--legacy-server-connect
--no-playlist

# ============================================
# FORMAT — audio only, prefer opus natively
# No extraction/transcode needed; opus is served natively by YouTube
# ============================================
-f "bestaudio[acodec^=opus][format*=medium][format_note*=original][language*=en][format_id!*=drc]/bestaudio[acodec^=opus]/bestaudio"

# ============================================
# POT PROVIDER — TERMUX
# ============================================
--extractor-args "youtubepot-bgutilhttp:base_url=http://127.0.0.1:4416"
#--extractor-args 'youtubepot-bgutilscript:script_path=/data/data/com.termux/files/home/storage/shared/Github/bgutil-ytdlp-pot-provider/server/build/generate_once.js'

# ============================================
# JS RUNTIMES
# ============================================
--js-runtimes node
--js-runtimes 'quickjs:/data/data/com.termux/files/usr/bin/qjs'
--js-runtimes 'deno:/data/data/com.termux/files/home/.deno/bin/deno'
--remote-components ejs:npm
--remote-components ejs:github

--extractor-args "youtubetab:skip=authcheck;youtube:formats=dashy;youtube:skip=hls;youtube:player_client=android_sdkless,mweb,web_creator,tv_embedded,web_safari,web_embedded;youtube:player_js_version=actual;youtube:fetch_pot=always;youtube:playback_wait=3;youtube-ejs:jitless=true"

# ============================================
# CONCURRENT FRAGMENTS
# ============================================
-N 4

# ============================================
# OUTPUT PATHS — Audio/ subfolder, no video metadata in filename
# ============================================
-o "%(channel,uploader)s/Audio/%(title).95s [%(acodec)s] [REL_%(release_timestamp>%Y-%m-%d_%I-%M-%S_%p,upload_date>%Y-%m-%d_%I-%M-%S_%p,epoch>%Y-%m-%d_%I-%M-%S_%p)s] [%(extractor)s.%(islive&live.|)s%(id)s].%(ext)s"

-o "thumbnail:%(channel,uploader)s/Audio/Misc/Thumbnails/%(title).95s [%(extractor)s.%(id)s].%(ext)s"
-o "infojson:%(channel,uploader)s/Audio/Misc/Infojson/%(title).95s [%(extractor)s.%(id)s].%(ext)s"
-o "description:%(channel,uploader)s/Audio/Misc/Descriptions/%(title).95s [%(extractor)s.%(id)s].%(ext)s"

# ============================================
# ERROR HANDLING
# ============================================
--no-abort-on-error
--no-overwrites
--fixup never
--skip-unavailable-fragments

# ============================================
# PROGRESS DISPLAY
# ============================================
--progress
--progress-template "download-title:%(progress._percent_str)s %(progress._eta_str)s %(progress._speed_str)s"
--progress-delta 0.2
--console-title
--newline

# ============================================
# EMBED SETTINGS — audio-appropriate only
# No FFmpegCopyStream (video-only post-processor), no chapter embed
# ============================================
--embed-metadata
--embed-thumbnail
--convert-thumbnails png
--write-info-json
--write-thumbnail
--write-description
--mtime
--no-check-certificates

# ============================================
# END OF CONFIG
# ============================================
