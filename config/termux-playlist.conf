# termux-playlist.conf — yt-dlp configuration for Termux (playlist mode)
# Managed by: yt-dlp-termux
#
# Extends termux-solo.conf behaviour with playlist-specific settings.
# Personal settings belong in user.conf — NOT in this file.

# ─── POT Provider ────────────────────────────────────────────────────────────
--extractor-args "youtubepot-bgutilhttp:base_url=http://127.0.0.1:4416"

# ─── YouTube extractor arguments ─────────────────────────────────────────────
--extractor-args "youtubetab:skip=authcheck;youtube:formats=dashy;youtube:skip=hls;youtube:player_client=android_sdkless,mweb,web_creator,tv_embedded,web_safari,web_embedded;youtube:player_js_version=actual;youtube:fetch_pot=always;youtube:playback_wait=3;youtube-ejs:jitless=true"

# ─── JavaScript runtimes ──────────────────────────────────────────────────────
--extractor-args "youtube:jsinterp_order=node,quickjs:/data/data/com.termux/files/usr/bin/qjs,deno:/data/data/com.termux/files/home/.deno/bin/deno"

# ─── Format ──────────────────────────────────────────────────────────────────
-f "bv[vcodec^=avc]+ba[acodec^=mp4a]/bv[vcodec^=avc]+ba/bv+ba/best"
--merge-output-format mp4

# ─── Network ─────────────────────────────────────────────────────────────────
-N 4
--socket-timeout 30
--retries 10
--fragment-retries 10
--retry-sleep 5

# ─── Playlist output layout ───────────────────────────────────────────────────
# Includes playlist_index for ordered filenames within a playlist folder
--paths "/data/data/com.termux/files/home/storage/shared/Termux-Extension-Archive"
-o "%(channel)s [%(channel_id)s]/%(playlist_title)s [%(playlist_id)s]/%(playlist_index)s REL_%(upload_date>%Y%m%d,release_date>%Y%m%d,epoch>%Y%m%d)s DL_%(epoch+28800>%Y%m%d_%H%M%S)s %(title).100B [%(vcodec)s %(acodec)s][%(extractor_key)s %(id)s].%(ext)s"
-o "thumbnail:%(channel)s [%(channel_id)s]/%(playlist_title)s [%(playlist_id)s]/%(id)s.%(ext)s"

# ─── Metadata ────────────────────────────────────────────────────────────────
--write-info-json
--embed-thumbnail
--embed-metadata
--embed-chapters
--embed-subs
--sub-langs "en.*,en-orig"
--convert-thumbnails jpg

# ─── Factsheet sidecar ───────────────────────────────────────────────────────
--print-to-file "%(channel)s\n%(channel_url)s\n%(uploader_id)s\n%(webpage_url)s\n%(title)s\n%(upload_date)s\n%(duration_string)s\n%(view_count)s\n%(like_count)s\n%(playlist_title)s\n%(playlist_index)s\n%(description)s" "%(channel)s [%(channel_id)s]/%(playlist_title)s [%(playlist_id)s]/%(id)s.factsheet.nfo"

# ─── SponsorBlock ────────────────────────────────────────────────────────────
--sponsorblock-mark "sponsor,intro,outro,selfpromo,interaction,music_offtopic"

# ─── Progress ────────────────────────────────────────────────────────────────
--progress
--console-title
--newline

# ─── Error handling ──────────────────────────────────────────────────────────
--fixup never
--ignore-errors
--no-abort-on-error

# ─── Cache ───────────────────────────────────────────────────────────────────
--cache-dir "/data/data/com.termux/files/home/.cache/yt-dlp"
