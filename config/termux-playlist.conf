# ============================================
# TERMUX CONFIG — PLAYLIST VARIANT
# Platform: Android / Termux (aarch64)
# Base path: ~/storage/shared/
# Run with: yt-dlp --config-location termux-playlist.conf
# Or via: ytdlp-run.sh (select option 2)
#
# Derived from termux-solo.conf.
# Key differences vs solo:
#   - --no-playlist removed; --yes-playlist active
#   - Output path includes %(playlist)s folder nesting
#   - --playlist-items available (uncomment to restrict range)
#   - Archive file scoped to playlist downloads
# ============================================

--cookies 2026-marcophoenix.txt
--download-archive crabs-arkayb.txt

# Uncomment to restrict to specific items, e.g. 1-10 or 1,3,5
#--playlist-items 1-50

--yes-playlist
--format-sort-force
--prefer-insecure
--legacy-server-connect

-S "lang:en-US,res:1080,vcodec:vp9,acodec:opus,proto:https,br,fps:60"
-f "(bestvideo[format_note*=Premium][vcodec^=vp9.2][width<=1920][height>=930][fps>=23.95][fps<=60]/bestvideo[vcodec^=vp9.2][width<=1920][height>=930][fps>=23.95][fps<=60]/bestvideo[vcodec^=vp9][width<=1920][height>=930][fps>=23.95][fps<=60]/bestvideo[vcodec^=avc1][width<=1920][height>=930][fps>=23.95][fps<=60]/bestvideo[width>=1280][height>=720][fps>=23.95][fps<=60])+(bestaudio[acodec^=opus][format*=medium][format_note*=original][language*=en][format_id!*=drc]/bestaudio)"

# ============================================
# POT PROVIDER — TERMUX
# ============================================
--extractor-args "youtubepot-bgutilhttp:base_url=http://127.0.0.1:4416"
#--extractor-args 'youtubepot-bgutilscript:script_path=/data/data/com.termux/files/home/storage/shared/Github/bgutil-ytdlp-pot-provider/server/build/generate_once.js'

# ============================================
# JS RUNTIMES
# ============================================
--js-runtimes node
--js-runtimes 'quickjs:/data/data/com.termux/files/usr/bin/qjs'
--js-runtimes 'deno:/data/data/com.termux/files/home/.deno/bin/deno'
--remote-components ejs:npm
--remote-components ejs:github

--extractor-args "youtubetab:skip=authcheck;youtube:formats=dashy;youtube:skip=hls;youtube:player_client=android_sdkless,mweb,web_creator,tv_embedded,web_safari,web_embedded;youtube:player_js_version=actual;youtube:fetch_pot=always;youtube:playback_wait=3;youtube-ejs:jitless=true"

# ============================================
# CONCURRENT FRAGMENTS
# ============================================
-N 4

# ============================================
# OUTPUT PATHS — playlist-aware folder nesting
# ============================================
-o "%(channel,uploader)s/%(playlist,playlist_title)s/%(playlist_index&{:03d}. |)s%(title).95s [%(resolution)s-%(fps)s-FPS-%(dynamic_range)s] [REL_%(release_timestamp>%Y-%m-%d_%I-%M-%S_%p,upload_date>%Y-%m-%d_%I-%M-%S_%p,epoch>%Y-%m-%d_%I-%M-%S_%p)s] [%(vcodec)s][%(acodec)s] [%(extractor)s.%(islive&live.|)s%(id)s] {%(protocol)s} {%(format_id)s}.%(ext)s"

-o "description:%(channel,uploader)s/%(playlist,playlist_title)s/Misc/Descriptions/%(title).95s [%(extractor)s.%(id)s].%(ext)s"
-o "link:%(channel,uploader)s/%(playlist,playlist_title)s/Misc/Links/%(title).95s [%(extractor)s.%(id)s].%(ext)s"
-o "thumbnail:%(channel,uploader)s/%(playlist,playlist_title)s/Misc/Thumbnails/%(title).95s [%(extractor)s.%(id)s].%(ext)s"
-o "infojson:%(channel,uploader)s/%(playlist,playlist_title)s/Misc/Infojson/%(title).95s [%(extractor)s.%(id)s].%(ext)s"

# ============================================
# ERROR HANDLING
# ============================================
--no-abort-on-error
--no-overwrites
--sponsorblock-mark all,-filler
--fixup never
--skip-unavailable-fragments

# ============================================
# PROGRESS DISPLAY
# ============================================
--progress
--progress-template "download-title:%(progress._percent_str)s %(progress._eta_str)s %(progress._speed_str)s"
--progress-delta 0.2
--console-title
--newline

# ============================================
# FFMPEG / EMBED SETTINGS
# ============================================
--merge-output-format mkv
--remux mkv
--use-postprocessor FFmpegCopyStream
--ppa "copystream:-id3v2_version 3 -metadata:s:v comment=Cover\ (Front)"
--embed-metadata
--embed-thumbnail
--embed-chapters
--convert-thumbnails png
--ppa "ThumbnailsConvertor:-vf scale=1920x1080"
--write-info-json
--write-thumbnail
--write-description
--write-link
--mtime
--no-check-certificates
--no-write-playlist-metafiles

# ============================================
# END OF CONFIG
# ============================================
